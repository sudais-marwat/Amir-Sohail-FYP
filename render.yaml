services:
  - type: web
    name: hadaf-rag-chatbot-api
    runtime: node
    rootDir: .
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm run start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hadaf-rag-chatbot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: text-embedding-004
      - key: FAISS_SERVICE_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads

  - type: web
    name: hadaf-rag-chatbot-faiss
    runtime: docker
    rootDir: faiss-service
    envVars:
      - key: PORT
        value: 8001

databases:
  - name: hadaf-rag-chatbot-db
    databaseName: hadaf_chatbot
    user: hadaf_chatbot
