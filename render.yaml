services:
  - type: web
    name: hadaf-rag-chatbot-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm run start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-2
      - key: FAISS_SERVICE_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads

  - type: web
    name: hadaf-rag-chatbot-faiss
    runtime: docker
    plan: free
    rootDir: faiss-service
    envVars:
      - key: PORT
        value: 8001
